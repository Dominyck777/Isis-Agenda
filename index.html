<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0d0f12" />
    <link rel="apple-touch-icon" href="/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Isis Agenda</title>
    <style>
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.05); opacity: 1; }
      }
      /* Ocultar splash no PC (largura maior que 768px) */
      @media (min-width: 769px) {
        #splash { display: none !important; }
      }
    </style>
  </head>
  <body style="margin: 0; background-color: #0d0f12;">
    <div id="root">
      <div id="splash" style="position: fixed; top:0; left:0; width:100%; height:100%; background: #000000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;">
        <img src="/favicon.png" alt="Loading..." style="width: 120px; height: 120px; animation: pulse 2s infinite ease-in-out; border-radius: 50%;">
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
